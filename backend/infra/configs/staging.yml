# =============================================
# 总配置 · STAGING profile（模板，待启用）
# 适用场景：预发布环境，与 prod 共用基础设施但独立命名空间
# 启用方式：
#   1) 修改各服务的 application-local.yml，import 改指此文件
#   2) 或者新增 application-staging.yml，把 spring.profiles.active 改为 staging
# =============================================

# --- PostgreSQL (staging DB，建议独立 schema/db) ---
spring:
  datasource:
    url: jdbc:postgresql://STAGING_HOST:65432/home_staging?sslmode=disable
    username: pgsql
    password: CHANGE_ME
    driver-class-name: org.postgresql.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000

  # --- Redis (staging 独立实例) ---
  data:
    redis:
      host: STAGING_HOST
      port: 16379
      password: CHANGE_ME

  # --- Nacos (staging 命名空间) ---
  cloud:
    nacos:
      discovery:
        server-addr: STAGING_HOST:18848
        namespace: staging
        username: CHANGE_ME
        password: CHANGE_ME
      config:
        server-addr: STAGING_HOST:18848
        namespace: staging
        username: CHANGE_ME
        password: CHANGE_ME

  # --- Elasticsearch ---
  elasticsearch:
    uris: http://STAGING_HOST:19200
    username: elastic
    password: CHANGE_ME

  # --- RabbitMQ ---
  rabbitmq:
    host: STAGING_HOST
    port: 35672
    username: rabbitmq
    password: CHANGE_ME

  # --- OpenAI / SiliconFlow (复用 prod key 或独立) ---
  ai:
    openai:
      api-key: CHANGE_ME_OR_USE_PROD_KEY

# --- Seata ---
seata:
  enabled: true
  application-id: ${spring.application.name}
  tx-service-group: default_tx_group
  enable-auto-data-source-proxy: false
  config:
    type: file
  registry:
    type: file
  service:
    vgroup-mapping:
      default_tx_group: default
    grouplist:
      default: STAGING_HOST:18091

# --- MinIO (建议独立 bucket) ---
app:
  minio:
    endpoint: http://STAGING_HOST:19000
    web-port: 19001
    access-key: CHANGE_ME
    secret-key: CHANGE_ME
    bucket: homecentral-staging
