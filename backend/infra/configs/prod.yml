# =============================================
# 总配置 · PROD profile（模板）
# 适用场景：生产环境
# 启用前必须把全部 CHANGE_ME 替换成实际值
# 强烈建议：所有密钥通过环境变量 / Seata 配置中心 / 密钥管理服务 注入，
#           不要直接写在本文件里
# =============================================

# --- PostgreSQL (生产) ---
spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT:5432}/${POSTGRES_DB:home_prod}?sslmode=require
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 10
      min-idle: 5
      max-active: 50
      max-wait: 30000

  # --- Redis ---
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}

  # --- Nacos ---
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST}:${NACOS_GRPC_PORT:8848}
        namespace: prod
        username: ${NACOS_USER}
        password: ${NACOS_PASSWORD}
      config:
        server-addr: ${NACOS_HOST}:${NACOS_GRPC_PORT:8848}
        namespace: prod
        username: ${NACOS_USER}
        password: ${NACOS_PASSWORD}

  # --- Elasticsearch ---
  elasticsearch:
    uris: ${ES_URIS}
    username: ${ES_USER}
    password: ${ES_PASSWORD}

  # --- RabbitMQ ---
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASSWORD}

  # --- OpenAI / SiliconFlow ---
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}

# --- Seata ---
seata:
  enabled: true
  application-id: ${spring.application.name}
  tx-service-group: ${SEATA_TX_GROUP:default_tx_group}
  enable-auto-data-source-proxy: true
  config:
    type: nacos
    nacos:
      server-addr: ${NACOS_HOST}:8848
      namespace: prod
      group: SEATA_GROUP
  registry:
    type: nacos
  service:
    vgroup-mapping:
      default_tx_group: default
    grouplist:
      default: ${SEATA_HOST}:8091

# --- MinIO ---
app:
  minio:
    endpoint: ${MINIO_ENDPOINT}
    web-port: ${MINIO_WEB_PORT:9001}
    access-key: ${MINIO_ACCESS_KEY}
    secret-key: ${MINIO_SECRET_KEY}
    bucket: ${MINIO_BUCKET:homecentral}
