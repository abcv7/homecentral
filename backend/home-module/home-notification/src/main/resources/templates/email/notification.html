<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>栖物集 - {{headline}}</title>
</head>
<body style="margin:0;padding:0;background:#fff7ed;font-family:'PingFang SC','Microsoft YaHei',Helvetica,Arial,sans-serif;color:#1f2937;">

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#fff7ed;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="560" cellpadding="0" cellspacing="0" border="0" style="max-width:560px;width:100%;background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 8px 24px rgba(249,115,22,0.08);">

          <tr>
            <td style="background:linear-gradient(135deg,#fbbf24 0%,#f97316 100%);padding:32px 40px 28px 40px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td>
                    <span style="display:inline-block;background:rgba(255,255,255,0.22);color:#ffffff;font-size:12px;letter-spacing:2px;padding:6px 14px;border-radius:999px;font-weight:600;">
                      🏠&nbsp;栖物集&nbsp;·&nbsp;HOME&nbsp;CENTRAL
                    </span>
                  </td>
                </tr>
                <tr><td style="height:20px;line-height:20px;font-size:0;">&nbsp;</td></tr>
                <tr>
                  <td>
                    <span style="display:inline-block;background:#ffffff;color:#f97316;font-size:13px;font-weight:600;padding:6px 14px;border-radius:999px;">
                      {{badge}}
                    </span>
                  </td>
                </tr>
                <tr><td style="height:10px;line-height:10px;font-size:0;">&nbsp;</td></tr>
                <tr>
                  <td style="color:#ffffff;font-size:24px;font-weight:700;line-height:1.4;">
                    {{headline}}
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <tr>
            <td style="padding:32px 40px 8px 40px;">
              <div style="color:#1f2937;font-size:15px;line-height:1.7;">
                <p style="margin:0 0 12px 0;">{{greeting}}</p>
                <p style="margin:0 0 12px 0;">{{body}}</p>
              </div>
            </td>
          </tr>

          <tr>
            <td style="padding:0 40px 8px 40px;">
              {{itemsTable}}
            </td>
          </tr>

          <tr>
            <td style="padding:16px 40px 8px 40px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#fff7ed;border-radius:10px;">
                <tr>
                  <td style="padding:14px 20px;">
                    <div style="color:#4b5563;font-size:13px;line-height:1.6;">{{hint}}</div>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <tr>
            <td style="padding:24px 40px 28px 40px;text-align:center;">
              <div style="color:#9ca3af;font-size:12px;line-height:1.6;">
                此邮件由 <b style="color:#6b7280;">栖物集</b> 自动发送，请勿直接回复。
              </div>
              <div style="color:#d1d5db;font-size:11px;padding-top:4px;">
                © {{year}} 栖物集 · 您的家庭数字中枢
              </div>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
