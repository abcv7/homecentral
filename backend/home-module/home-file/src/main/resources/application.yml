spring:
  application:
    name: home-file
  profiles:
    active: local

server:
  address: 0.0.0.0
  port: 18104

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  default-flat-param-object: true
  swagger-ui:
    enabled: true
  api-docs:
    path: /v3/api-docs
    enabled: true

knife4j:
  enable: true
  setting:
    language: ZH_CN

app:
  minio:
    endpoint: ${APP_MINIO_ENDPOINT:http://localhost:19000}
    web-port: ${APP_MINIO_WEB_PORT:19001}
    access-key: ${APP_MINIO_ACCESS_KEY:homecentral}
    secret-key: ${APP_MINIO_SECRET_KEY:homecentral123}
    bucket: ${APP_MINIO_BUCKET:homecentral}

seata:
  enabled: ${SEATA_ENABLED:false}

spring.cloud.nacos:
  discovery:
    enabled: ${NACOS_DISCOVERY_ENABLED:false}
  config:
    import-check:
      enabled: false

spring.elasticsearch:
  uris: ${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}
