<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="house" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
  </defs>
  <!-- Rounded square background with safe area padding (maskable) -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <!-- House silhouette -->
  <path d="M256 128 L384 232 L384 384 L288 384 L288 304 L224 304 L224 384 L128 384 L128 232 Z"
        fill="url(#house)" stroke="#1e293b" stroke-width="6" stroke-linejoin="round"/>
  <!-- Glowing center control dot -->
  <circle cx="256" cy="240" r="28" fill="url(#glow)"/>
  <circle cx="256" cy="240" r="12" fill="#fff7ed"/>
  <!-- Subtle inner border for depth -->
  <rect x="6" y="6" width="500" height="500" rx="108" ry="108"
        fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="4"/>
</svg>
